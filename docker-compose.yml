services:
  mongo:
    image: mongo:7
    container_name: swell_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-swelladmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-swellpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-swelldb}
    volumes:
      - mongo_data:/data/db
    networks:
      - swell_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swell_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - uploads_data:/app/uploads
    networks:
      - swell_network
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: swell_frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api/v1
    networks:
      - swell_network
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: swell_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/uploads:ro
    networks:
      - swell_network
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
  uploads_data:

networks:
  swell_network:
    driver: bridge
